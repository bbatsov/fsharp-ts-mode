site_name: fsharp-ts-mode
site_url: https://bbatsov.github.io/fsharp-ts-mode
site_description: A tree-sitter-based Emacs major mode for F# development
repo_url: https://github.com/bbatsov/fsharp-ts-mode
repo_name: bbatsov/fsharp-ts-mode
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage:
    - Getting Started: usage.md
    - Code Navigation: navigation.md
    - Configuration: configuration.md
    - REPL Integration: repl.md
    - Eglot (LSP): eglot.md
    - dotnet CLI: dotnet.md
  - Migration: migration.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
  - Contributing: contributing.md
